name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: paper_trader_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d paper_trader_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PAPER_TRADER_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/paper_trader_test
      PAPER_TRADER_TEST_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/paper_trader_test
      PAPER_TRADER_SERVICE_API_KEY: ci-test-key

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run database migrations
        run: python -m alembic -c alembic.ini upgrade head

      - name: Run tests
        run: python -m pytest tests/ -v
